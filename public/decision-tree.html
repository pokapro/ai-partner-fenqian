<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>AI еҗҲдјҷжҷәеӣҠ вҖ” еҶізӯ–ж ‘дҪ“йӘҢзүҲ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>рҹ§ӯ</text></svg>" />
<style>
  :root {
    --bg: #edf2ef;
    --surface: rgba(255,255,255,0.86);
    --surface-strong: #ffffff;
    --ink: #0c1815;
    --text: #14201c;
    --text-sec: #52615b;
    --text-ter: #82908a;
    --accent: #0b6b5c;
    --accent-hover: #07564a;
    --accent-bg: #e8f6f1;
    --gold: #b9914a;
    --border: rgba(34,67,59,0.14);
    --line: rgba(17,61,52,0.10);
    --shadow: 0 10px 30px rgba(15,30,26,0.08);
    --shadow-lg: 0 24px 70px rgba(15,30,26,0.16), 0 6px 18px rgba(15,30,26,0.08);
    --radius: 18px;
    --radius-sm: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.80), rgba(237,242,239,0.92) 44%, rgba(226,235,231,0.98)),
      linear-gradient(120deg, rgba(11,107,92,0.14), transparent 34%),
      linear-gradient(300deg, rgba(185,145,74,0.12), transparent 38%),
      var(--bg);
    color: var(--text); line-height: 1.5;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
    display: flex; justify-content: center; align-items: flex-start;
    padding: 2rem 1rem; position: relative; overflow-x: hidden;
  }
  /* з§‘жҠҖе’ЁиҜўж„ҹиғҢжҷҜпјҡз»ҶзҪ‘ж ј + ж–ңеҗ‘е…үеёҰпјҢдёҚдҪҝз”ЁзәҜиүІеә•гҖӮ */
  body::before, body::after { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  body::before {
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px),
      linear-gradient(135deg, transparent 0 58%, rgba(11,107,92,0.07) 58% 58.4%, transparent 58.4% 100%);
    background-size: 42px 42px, 42px 42px, 420px 420px;
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.84), rgba(0,0,0,0.32) 68%, rgba(0,0,0,0.08));
  }
  body::after {
    background:
      linear-gradient(115deg, transparent 0 18%, rgba(255,255,255,0.72) 18% 28%, transparent 28%),
      repeating-linear-gradient(115deg, transparent 0 78px, rgba(11,107,92,0.045) 78px 80px, transparent 80px 156px);
    opacity: 0.72;
  }
  .app {
    max-width: 760px; width: 100%;
    background: rgba(255,255,255,0.72); border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.72);
    box-shadow: var(--shadow-lg); overflow: hidden; position: relative; z-index: 1;
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  }

  /* Header banner вҖ” еҠЁжҖҒиғҢжҷҜ */
  @keyframes shiftBg {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .banner {
    background:
      linear-gradient(135deg, rgba(10,24,21,0.98) 0%, rgba(15,45,39,0.98) 52%, rgba(9,87,75,0.96) 100%);
    padding: 1.85rem 2rem 1.75rem; color: white; position: relative; overflow: hidden;
    border-bottom: 1px solid rgba(255,255,255,0.10);
  }
  .banner::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px),
      linear-gradient(120deg, transparent 0 62%, rgba(185,145,74,0.18) 62% 62.6%, transparent 62.6%);
    background-size: 38px 38px, 38px 38px, 360px 360px;
    opacity: 0.46; pointer-events: none;
  }
  .banner::after {
    content: 'STATA CONSULTING'; position: absolute; right: 1.6rem; bottom: 1.25rem;
    color: rgba(255,255,255,0.10); font-size: 0.72rem; letter-spacing: 0.18em;
    pointer-events: none;
  }
  .banner h1 { font-size: 1.35rem; font-weight: 750; letter-spacing: -0.4px; position: relative; z-index: 1; }
  .banner p { font-size: 0.84rem; color: rgba(255,255,255,0.68); margin-top: 0.25rem; position: relative; z-index: 1; }
  .banner .badge {
    display: inline-block; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.5px;
    background: rgba(255,255,255,0.11); color: #d7f7eb;
    border: 1px solid rgba(255,255,255,0.18);
    padding: 0.18rem 0.68rem; border-radius: 999px; margin-bottom: 0.48rem;
    position: relative; z-index: 1;
  }
  .brand-kicker {
    position: relative; z-index: 1;
    display: block;
    color: rgba(255,255,255,0.72);
    font-size: 0.72rem;
    font-weight: 650;
    letter-spacing: 0.18em;
    margin-bottom: 0.42rem;
  }
  .banner a { color: rgba(255,255,255,0.46); font-size: 0.72rem; margin-top: 0.56rem; display: inline-block; text-decoration: none; transition: color 0.2s; position: relative; z-index: 1; }
  .banner a:hover { color: rgba(255,255,255,0.75); }

  /* Content area */
  .content {
    padding: 1.35rem;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.78) 0%, rgba(248,251,249,0.88) 30px, rgba(255,255,255,0.72) 100%);
  }

  /* Chat area вҖ” еҶ…йҳҙеҪұеўһејәеұӮж¬Ў */
  .chat {
    min-height: 300px; max-height: 48vh; overflow-y: auto;
    margin-bottom: 0.75rem;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.88), rgba(244,249,246,0.86)),
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: auto, 32px 32px, 32px 32px;
    border-radius: var(--radius);
    border: 1px solid rgba(34,67,59,0.13);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.86), 0 12px 28px rgba(18,43,37,0.06);
    padding: 0.9rem;
  }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-thumb { background: #d0d3da; border-radius: 2px; }
  /* з©әзҠ¶жҖҒ вҖ” и§Ҷи§үжӣҙдё°еҜҢ */
  .chat:empty::before {
    content: ''; display: block; height: 100%; min-height: 200px;
    background:
      linear-gradient(120deg, rgba(11,107,92,0.10), transparent 34%),
      repeating-linear-gradient(90deg, transparent 0 18px, rgba(20,32,28,0.035) 18px 19px);
    opacity: 0.9; border-radius: 14px;
  }
  .chat:empty::after {
    content: 'иҫ“е…ҘеҗҲдјҷжғ…еҶөпјҢзі»з»ҹдјҡиҜҶеҲ«еҮәиө„гҖҒеҮәеҠӣгҖҒжҺ§еҲ¶жқғгҖҒд»ЈжҢҒдёҺйҖҖеҮәйЈҺйҷ©'; display: flex;
    align-items: center; justify-content: center;
    height: 100%; min-height: 200px; margin-top: -200px;
    position: relative; z-index: 1;
    color: var(--text-sec); font-size: 0.86rem; font-weight: 500;
    text-align: center; line-height: 1.7;
  }

  /* Messages */
  .msg { display: flex; margin-bottom: 0.7rem; animation: in 0.25s ease-out; }
  @keyframes in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg-bot { justify-content: flex-start; }
  .msg-user { justify-content: flex-end; }
  .msg .av {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 0.75rem;
    margin-right: 0.5rem;
    background: linear-gradient(135deg, #eff7f3, #dbeae4);
    border: 1px solid rgba(34,67,59,0.12);
  }
  .msg .b {
    max-width: 80%; font-size: 0.85rem; line-height: 1.65;
    padding: 0.5rem 0.85rem; border-radius: var(--radius-sm);
  }
  .msg-bot .b {
    background: rgba(255,255,255,0.92); color: var(--text); border-bottom-left-radius: 3px;
    border: 1px solid rgba(34,67,59,0.10);
    box-shadow: 0 8px 18px rgba(18,43,37,0.05);
  }
  .msg-user .b {
    background: linear-gradient(135deg, #0b6b5c, #0a4f45); color: white; border-bottom-right-radius: 3px;
    box-shadow: 0 10px 20px rgba(11,107,92,0.18);
  }

  /* Options */
  .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; margin-top: 0.5rem; max-width: 80%; }
  .opts .o {
    background: rgba(255,255,255,0.92); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 0.5rem 0.75rem; cursor: pointer; font-family: inherit; font-size: 0.8rem; color: var(--text);
    text-align: left; transition: all 0.15s;
  }
  .opts .o:hover { border-color: rgba(11,107,92,0.45); background: var(--accent-bg); transform: translateY(-1px); }
  .opts .o.sel, .opts .o.selected { background: var(--accent); border-color: var(--accent); color: white; }
  .opts .o .d { font-size: 0.7rem; color: var(--text-ter); margin-top: 0.05rem; }
  .opts .o.sel .d { color: rgba(255,255,255,0.7); }
  .opts.single { grid-template-columns: 1fr; }

  /* Input */
  .inp {
    display: flex; gap: 0.5rem; align-items: flex-end;
    background: rgba(255,255,255,0.76); border: 1px solid rgba(34,67,59,0.13);
    border-radius: 16px; padding: 0.45rem;
    box-shadow: 0 12px 28px rgba(18,43,37,0.06);
  }
  .inp textarea {
    flex: 1; resize: none; border: none; border-radius: 12px;
    font-size: 0.86rem; line-height: 1.55; padding: 0.55rem 0.7rem; font-family: inherit; color: var(--text);
    background: transparent; transition: background 0.2s;
  }
  .inp textarea::placeholder { color: var(--text-ter); }
  .inp textarea:focus { outline: none; background: rgba(255,255,255,0.68); }
  .inp .send {
    background: linear-gradient(135deg, var(--accent), #0a4f45); color: white; border: none;
    padding: 0.58rem 1.2rem; border-radius: 12px; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: background 0.15s;
    white-space: nowrap; box-shadow: 0 10px 20px rgba(11,107,92,0.18);
  }
  .inp .send:hover { background: linear-gradient(135deg, var(--accent-hover), #073d35); }
  .hint { font-size: 0.72rem; color: var(--text-ter); margin: 0.45rem 0 0 0.2rem; }

  /* Action */
  .action { margin-top: 0.75rem; }
  .action .banner-sm {
    background:
      linear-gradient(135deg, rgba(12,24,21,0.98), rgba(12,94,81,0.94)),
      linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: auto, 28px 28px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: var(--radius); padding: 1rem 1.25rem; text-align: center;
    box-shadow: 0 16px 34px rgba(11,107,92,0.18);
  }
  .action .banner-sm .t { font-size: 0.9rem; font-weight: 700; color: white; }
  .action .banner-sm .s { font-size: 0.72rem; color: rgba(255,255,255,0.75); margin: 0.2rem 0 0.6rem; }
  .action .banner-sm button {
    width: 100%; background: white; color: var(--accent); border: none;
    padding: 0.65rem; border-radius: 10px; font-size: 0.85rem; font-weight: 750; cursor: pointer; font-family: inherit;
  }

  /* Result area */
  .result { margin-top: 0.75rem; }
  .bar {
    display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 0.75rem;
    padding: 0.5rem; border: 1px solid rgba(34,67,59,0.11);
    border-radius: 14px; background: rgba(255,255,255,0.72);
  }
  .bar button {
    font-size: 0.72rem; background: rgba(255,255,255,0.90); border: 1px solid var(--border);
    padding: 0.32rem 0.68rem; border-radius: 8px; cursor: pointer; font-family: inherit; color: var(--text-sec);
  }
  .bar button:hover { border-color: var(--accent); color: var(--accent); }

  #report-sections {
    font-size: 0.84rem; line-height: 1.78;
    background: rgba(255,255,255,0.86);
    border: 1px solid rgba(34,67,59,0.12);
    border-radius: var(--radius);
    padding: 1rem;
    box-shadow: 0 14px 34px rgba(18,43,37,0.06);
  }
  #report-sections h2 { font-size: 1.02rem; font-weight: 750; margin: 1rem 0 0.4rem; color: var(--ink); }
  #report-sections h3 { font-size: 0.88rem; font-weight: 600; margin: 0.75rem 0 0.3rem; color: var(--text-sec); }
  #report-sections table { border-collapse: collapse; width: 100%; margin: 0.4rem 0; font-size: 0.78rem; }
  #report-sections th, #report-sections td { border: 1px solid var(--border); padding: 0.35rem 0.5rem; }
  #report-sections th { background: #eef6f2; font-weight: 600; color: var(--ink); }
  #report-sections blockquote { border-left: 3px solid var(--accent); margin: 0.5rem 0; padding: 0.3rem 0.75rem; background: var(--accent-bg); border-radius: 0 6px 6px 0; color: var(--text-sec); font-size: 0.8rem; }
  #report-sections code { background: #f0f2f5; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.78rem; color: var(--accent); }
  #report-sections hr { border: none; border-top: 1px solid var(--border); margin: 0.75rem 0; }

  /* Typing */
  .type { display: flex; align-items: center; gap: 0.25rem; padding: 0.35rem 0; }
  .type span { width: 5px; height: 5px; border-radius: 50%; background: #b0b8c8; animation: b 1.3s infinite; }
  .type span:nth-child(2) { animation-delay: 0.15s; }
  .type span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes b { 0%,80%,100% { transform: scale(0.6); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

  .restore {
    display: flex; justify-content: center; align-items: center; gap: 0.5rem;
    background: var(--accent-bg); border: 1px solid var(--accent); border-radius: var(--radius-sm);
    padding: 0.6rem 1rem; margin-bottom: 0.75rem; font-size: 0.78rem;
  }
  .restore button {
    background: var(--accent); color: white; border: none;
    padding: 0.2rem 0.55rem; border-radius: 5px; font-size: 0.72rem; cursor: pointer; font-family: inherit;
  }
  .restore .sec { background: #d0d3da; color: var(--text-sec); }
  .hidden { display: none !important; }

  @media (max-width: 500px) {
    .opts { grid-template-columns: 1fr; }
    body { padding: 0.75rem; }
    .app { border-radius: 18px; }
    .banner { padding: 1.25rem 1.25rem; }
    .banner::after { display: none; }
    .banner h1 { font-size: 1.22rem; }
    .content { padding: 0.875rem; }
    .chat { min-height: 300px; max-height: 52vh; padding: 0.72rem; }
    .msg .b { max-width: 86%; font-size: 0.84rem; }
    .inp { align-items: stretch; }
    .inp textarea { min-height: 4.8rem; }
    .inp .send { padding-left: 0.95rem; padding-right: 0.95rem; }
    #report-sections { padding: 0.85rem; }
  }
</style>
</head>
<body>

<div class="app">

<div class="banner">
  <span class="brand-kicker">ж–ҜеЎ”з®ЎзҗҶ</span>
  <div class="badge">еҶізӯ–ж ‘дҪ“йӘҢзүҲ</div>
  <h1>AI еҗҲдјҷжҷәеӣҠ</h1>
  <p>жҸҸиҝ°еҗҲдјҷжғ…еҶөпјҢзі»з»ҹеё®дҪ и®ҫи®Ўж–№жЎҲ</p>
  <a href="/">вҶҗ еӣһеҲ°ж ҮеҮҶзүҲ</a>
</div>

<div class="content">

<div id="chat-area" class="chat"></div>

<div class="inp">
  <textarea id="user-input" rows="2" placeholder="жҸҸиҝ°дҪ д»¬зҡ„еҗҲдјҷжғ…еҶөвҖҰдҫӢеҰӮпјҡжҲ‘е’Ң 2 дёӘжңӢеҸӢејҖеҘ¶иҢ¶еә—пјҢжҲ‘еҮә10дёҮе…ЁиҒҢпјҢд»–еҮә5дёҮжҠҖжңҜе…ҘиӮЎ"></textarea>
  <button id="send-btn" class="send">еҲҶжһҗ</button>
</div>
<div class="hint">жҸҸиҝ°и¶ҠиҜҰз»ҶпјҢеҲҶжһҗи¶ҠзІҫеҮҶ</div>

<div id="action-area" class="action hidden">
  <div class="banner-sm">
    <div class="t">рҹҺҜ дҝЎжҒҜж”¶йӣҶе®ҢжҜ•</div>
    <div id="final-summary" class="s"></div>
    <button id="generate-btn">рҹҡҖ з”ҹжҲҗе®Ңж•ҙж–№жЎҲ</button>
  </div>
</div>

<div id="result-area" class="result hidden">
  <div class="bar">
    <button id="copy-md-btn">рҹ“Ӣ еӨҚеҲ¶</button>
    <button id="copy-plain-btn">рҹ“қ зәҜж–Үжң¬</button>
    <button id="download-md-btn">в¬ҮпёҸ .md</button>
    <button id="download-html-btn">в¬ҮпёҸ .html</button>
    <button id="print-btn">рҹ–ЁпёҸ жү“еҚ°</button>
    <button id="back-to-start-btn" style="margin-left:auto;">рҹ”„ йҮҚж–°ејҖе§Ӣ</button>
  </div>
  <div id="report-sections"></div>
  <div id="model-used" style="font-size:0.7rem;color:var(--text-ter);margin-top:0.5rem;text-align:center;"></div>
</div>

</div>
</div>

<script>
// ===== зҠ¶жҖҒ =====
let state = {};
let currentBlock = null;
let isProcessing = false;
let isFinal = false;
let lastUserText = '';
let lastReportMd = '';

// ===== жҢҒд№…еҢ– =====
const LS_KEY = 'dt_state';
function saveState() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      state, currentBlock: currentBlock ? { id: currentBlock.id, isFinal: currentBlock.isFinal } : null,
      isFinal, lastUserText, lastReportMd, timestamp: Date.now()
    }));
  } catch(e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d.state || Date.now() - d.timestamp > 86400000) return false;
    state = d.state || {};
    if (d.currentBlock) { currentBlock = d.currentBlock; isFinal = d.isFinal || false; }
    lastUserText = d.lastUserText || '';
    lastReportMd = d.lastReportMd || '';
    return true;
  } catch(e) { return false; }
}
function clearState() { try { localStorage.removeItem(LS_KEY); } catch(e) {} }

// ===== е·Ҙе…· =====
const $ = (id) => document.getElementById(id);
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
function scrollBottom() { const a = $('chat-area'); a.scrollTop = a.scrollHeight; }

function addBotBubble(text, options = null) {
  const area = $('chat-area');
  const wrap = document.createElement('div');
  wrap.className = 'msg msg-bot';
  let body = `<div class="b">${escapeHtml(text)}</div>`;
  if (options && options.length) {
    const btns = options.map((o, i) => {
      const desc = o.desc ? `<div class="d">${escapeHtml(o.desc)}</div>` : '';
      return `<button class="o" data-idx="${i}"><div style="font-weight:500;">${o.icon ? o.icon+' ' : ''}${escapeHtml(o.label)}</div>${desc}</button>`;
    }).join('');
    body += `<div class="opts${options.length <= 3 ? ' single' : ''}">${btns}</div>`;
  }
  wrap.innerHTML = `<div class="av">рҹӨ–</div><div>${body}</div>`;
  area.appendChild(wrap);
  wrap.querySelectorAll('.o').forEach(btn => {
    btn.addEventListener('click', () => { const i = parseInt(btn.dataset.idx); selectOption(options[i], btn); });
  });
  scrollBottom();
}
function addUserBubble(text) {
  const a = $('chat-area'); const w = document.createElement('div');
  w.className = 'msg msg-user'; w.innerHTML = `<div class="b">${escapeHtml(text)}</div>`;
  a.appendChild(w); scrollBottom();
}
function addTyping() {
  const a = $('chat-area'); const w = document.createElement('div');
  w.id = 'typing-indicator'; w.className = 'msg msg-bot';
  w.innerHTML = '<div class="av">рҹӨ–</div><div class="b"><div class="type"><span></span><span></span><span></span></div></div>';
  a.appendChild(w); scrollBottom();
}
function removeTyping() { const t = $('typing-indicator'); if (t) t.remove(); }

// ===== еҶізӯ–ж ‘дәӨдә’ =====
async function loadNextStep(text = '') {
  if (isProcessing) return;
  isProcessing = true; addTyping();
  try {
    const res = await fetch('/api/decision-tree/next', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ state, text })
    });
    const data = await res.json();
    removeTyping();
    if (data.state) state = data.state;
    if (data.block) currentBlock = data.block;
    saveState();
    if (data.block) {
      addBotBubble(data.block.prompt, data.block.options);
      if (data.block.isFinal) { isFinal = true; showFinalActions(); }
    }
  } catch (err) { removeTyping(); addBotBubble('вқҢ еҮәй”ҷдәҶпјҡ' + err.message); }
  isProcessing = false;
}
function selectOption(opt, btnEl) {
  if (isProcessing) return;
  btnEl.classList.add('selected'); btnEl.disabled = true;
  const text = opt.label + (opt.desc ? 'пјҲ' + opt.desc + 'пјү' : '');
  addUserBubble(text);
  if (currentBlock.id === 'start') { state.route = opt.value; }
  else if (currentBlock.id === 'count_design') { state.partnerCount = opt.value; }
  else if (currentBlock.id && currentBlock.id.startsWith('branch_')) { state.funding = opt.value; state.branch = opt.branch; }
  else if (currentBlock.id === 'concern') { state.concern = opt.value; }
  else if (currentBlock.id === 'abnormal_type') { state.tags = state.tags || []; if (opt.tag && !state.tags.includes(opt.tag)) state.tags.push(opt.tag); }
  else if (currentBlock.id === 'faq_topic') { state.concern = opt.value; }
  loadNextStep('');
}
function showFinalActions() {
  const area = $('action-area'); const summary = $('final-summary');
  area.classList.remove('hidden');
  const sceneText = state.branch || `${state.partnerCount||'?'}дәә${state.funding?'_'+state.funding:''}${state.concern?'_'+state.concern:''}`;
  summary.textContent = `е·ІиҜҶеҲ«пјҡ${sceneText}гҖӮзӮ№еҮ»з”ҹжҲҗе®Ңж•ҙж–№жЎҲ`;
}
function updateSceneBar(st) {
  const bar = $('scene-bar'), tw = $('scene-tags');
  if (!bar || !tw) return;
  const tags = [];
  if (st.route) tags.push({text:{A:'ж–№жЎҲи®ҫи®Ў',B:'жқЎж¬ҫе®ҡеҲ¶',C:'зә зә·ејӮеёё',D:'еёёиҜҶе’ЁиҜў'}[st.route]||st.route,color:'bg-indigo-100 text-indigo-700'});
  if (st.partnerCount) tags.push({text:st.partnerCount+' дәә',color:'bg-purple-100 text-purple-700'});
  if (st.funding) { const m={both_funded_equal:'йғҪеҮәй’ұеҗҢе…ЁиҒҢ',investor_operator:'жҲ‘е…ЁиҒҢд»–еҸӘеҮәй’ұ',tech_money:'жҲ‘еҮәй’ұд»–еҮәжҠҖжңҜ',family:'еӨ«еҰ»/дәІеұһ',one_dominant:'1дё»2и·ҹжҠ•',three_roles:'иө„йҮ‘иҝҗиҗҘжҠҖжңҜ',equal_three:'дёүдәәеқҮеҲҶ',one_angel_many_hands:'1еӨ©дҪҝ3жү§иЎҢ',equal_pool:'4-5дәәеқҮеҲҶ',franchise:'еҠ зӣҹеҗҲдјҷ',platform:'е№іеҸ°жҢҒиӮЎ',unclear:'йҖҡз”ЁеҹәеҮҶ'}; tags.push({text:m[st.funding]||st.funding,color:'bg-pink-100 text-pink-700'}); }
  if (st.concern) { const m={equity:'иӮЎжқғ',dividend:'еҲҶзәў',exit:'йҖҖеҮә',control:'жҺ§еҲ¶жқғ',agreement:'еҚҸи®®'}; tags.push({text:m[st.concern]||st.concern,color:'bg-green-100 text-green-700'}); }
  if (st.business) tags.push({text:'рҹҸӘ '+st.business,color:'bg-orange-100 text-orange-700'});
  if (tags.length===0) { if(bar)bar.classList.add('hidden'); return; }
  if(bar)bar.classList.remove('hidden');
  if(tw) tw.innerHTML = tags.map(t => `<span class="tag ${t.color}">${escapeHtml(t.text)}</span>`).join('');
}

// ===== жҠҘе‘Ҡз”ҹжҲҗ =====
async function doFinalize() {
  const freeText = lastUserText || $('user-input').value.trim();
  const btn = $('generate-btn');
  btn.disabled = true; btn.textContent = 'рҹӨ– AI жҺЁзҗҶдёӯ...';
  try {
    const res = await fetch('/api/decision-tree/generate-report', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ state, freeText })
    });
    const data = await res.json();
    if (data.ok) { renderDTReport(data); saveState(); } else { alert('з”ҹжҲҗеӨұиҙҘпјҡ'+data.error); btn.disabled=false; btn.textContent='рҹҡҖ з”ҹжҲҗе®Ңж•ҙж–№жЎҲ'; }
  } catch(err) { alert('зҪ‘з»ңй”ҷиҜҜпјҡ'+err.message); btn.disabled=false; btn.textContent='рҹҡҖ з”ҹжҲҗе®Ңж•ҙж–№жЎҲ'; }
}
function renderDTReport(data) {
  const area = $('result-area'); area.classList.remove('hidden');
  $('action-area').classList.add('hidden');
  const md = data.markdown || '';
  lastReportMd = md;
  const sections = $('report-sections');
  sections.innerHTML = md2html(md);
}
function md2html(md) {
  let h = md
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n- (.+)/g, '\n<li>$1</li>')
    .replace(/\n\d\. (.+)/g, '\n<li>$1</li>')
    .replace(/\n>/gm, '\n<blockquote>')
    .replace(/<\/blockquote>\n?/g, '</blockquote>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/<p><\/p>/g, '')
    .replace(/<li>/g, '<li style="margin-bottom:0.2rem;">');
  return '<p>' + h + '</p>';
}

// ===== дёҖй”®дәӨд»ҳ =====
function getReportMd() { if (lastReportMd) return lastReportMd; const s = $('report-sections'); if (!s) return ''; return s.innerText; }
function getReportPlain() { return getReportMd().replace(/^#{1,6}\s+/gm,'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\|/g,'').replace(/[в”Җв”Ңв”¬в”җв”ңв”јв”Өв””в”ҙв”ҳ]/g,'').replace(/\n{3,}/g,'\n\n'); }
function flashBtn(btn, text) { const o=btn.innerHTML; btn.innerHTML=text; btn.classList.add('ring-2','ring-green-400'); setTimeout(()=>{btn.innerHTML=o;btn.classList.remove('ring-2','ring-green-400')},1500); }
function copyMd() { const t=getReportMd(); if(!t)return; const b=$('copy-md-btn'); if(navigator.clipboard?.writeText){navigator.clipboard.writeText(t).then(()=>flashBtn(b,'вң… е·ІеӨҚеҲ¶'),()=>fallbackCopy(t,b,'вң… е·ІеӨҚеҲ¶'))}else{fallbackCopy(t,b,'вң… е·ІеӨҚеҲ¶')} }
function copyPlain() { const t=getReportPlain(); if(!t)return; const b=$('copy-plain-btn'); if(navigator.clipboard?.writeText){navigator.clipboard.writeText(t).then(()=>flashBtn(b,'вң… е·ІеӨҚеҲ¶'),()=>fallbackCopy(t,b,'вң… е·ІеӨҚеҲ¶'))}else{fallbackCopy(t,b,'вң… е·ІеӨҚеҲ¶')} }
function fallbackCopy(text,btn,ok) { const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');flashBtn(btn,ok)}catch(e){alert('еӨҚеҲ¶еӨұиҙҘ')}document.body.removeChild(ta); }
function timestamp() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`; }
function downloadFile(filename,content,mime) { const b=content instanceof Blob?content:new Blob([content],{type:mime+';charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(b),1000); }
function downloadMd() { const t=getReportMd(); if(!t)return; downloadFile(`еҗҲдјҷеҲҶй’ұж–№жЎҲ-${timestamp()}.md`,'text/markdown'); flashBtn($('download-md-btn'),'вң… е·ІдёӢиҪҪ'); }
function downloadHtml() { const t=getReportHtml(); if(!t)return; downloadFile(`еҗҲдјҷеҲҶй’ұж–№жЎҲ-${timestamp()}.html`,'text/html'); flashBtn($('download-html-btn'),'вң… е·ІдёӢиҪҪ'); }
function getReportHtml() {
  const md=getReportMd(); if(!md)return '';
  const body = md2html(md);
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>еҗҲдјҷеҲҶй’ұж–№жЎҲ</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;max-width:800px;margin:0 auto;padding:2rem;color:#1a1d23;line-height:1.7}h2{color:#059669;margin-top:2rem}h3{color:#5a6070;margin-top:1.5rem}table{border-collapse:collapse;width:100%;margin:1rem 0}th,td{border:1px solid #e6e8ec;padding:0.5rem;text-align:left}th{background:#f0f1f3}blockquote{border-left:3px solid #059669;margin:1rem 0;padding:0.5rem 1rem;background:#f0fdf4}code{background:#f0f1f3;padding:0.15rem 0.4rem;border-radius:3px;color:#059669;font-size:0.9em}pre{background:#f0f1f3;padding:1rem;border-radius:8px;overflow-x:auto}</style></head><body>${body}</body></html>`;
}
function printReport() { const h=getReportHtml(); if(!h)return; const w=window.open('','_blank'); if(!w)return; w.document.write(h); w.document.close(); w.addEventListener('load',()=>setTimeout(()=>w.print(),300)); }

// ===== йҮҚж–°ејҖе§Ӣ =====
function restartDT() {
  state={};currentBlock=null;isFinal=false;lastUserText='';lastReportMd='';clearState();
  $('chat-area').innerHTML='';$('action-area').classList.add('hidden');$('result-area').classList.add('hidden');$('user-input').value='';
}

// ===== дәӢд»¶з»‘е®ҡ =====
$('send-btn').addEventListener('click',()=>{const i=$('user-input'),t=i.value.trim();if(!t||isProcessing)return;addUserBubble(t);lastUserText=t;i.value='';loadNextStep(t);});
$('user-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();$('send-btn').click();}});
$('generate-btn').addEventListener('click',doFinalize);
$('copy-md-btn')?.addEventListener('click',copyMd);
$('copy-plain-btn')?.addEventListener('click',copyPlain);
$('download-md-btn')?.addEventListener('click',downloadMd);
$('download-html-btn')?.addEventListener('click',downloadHtml);
$('print-btn')?.addEventListener('click',printReport);
$('back-to-start-btn')?.addEventListener('click',restartDT);

// ===== еҗҜеҠЁ =====
(async()=>{
  const restored = loadState();
  if (restored && lastReportMd) {
    $('chat-area').innerHTML = `<div class="restore"><span>рҹ“Ӯ жЈҖжөӢеҲ°дёҠж¬Ўзҡ„дјҡиҜқи®°еҪ•</span><button onclick="restoreSession()">жҒўеӨҚ</button><button class="sec" onclick="clearState();location.reload()">йҮҚж–°ејҖе§Ӣ</button></div>`;
  } else if (restored) { restoreSession(); }
  try {
    const res = await fetch('/api/decision-tree/start');
    const d = await res.json();
    if (d.block) currentBlock = d.block;
  } catch(err) { console.warn('[init]', err.message); }
})();

function restoreSession() {
  $('chat-area').innerHTML = '';
  if (isFinal) showFinalActions();
  if (lastReportMd) $('result-area').classList.remove('hidden');
}
</script>
