<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 合伙智囊 — 决策树体验版</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>" />
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
  .chat-bubble-bot { background: #f3f4f6; color: #111827; border-radius: 14px 14px 14px 4px; }
  .chat-bubble-user { background: #4f46e5; color: white; border-radius: 14px 14px 4px 14px; }
  .opt-btn { transition: all 0.15s; }
  .opt-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15); }
  .opt-btn.selected { background: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
  .tag { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .typing-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #9ca3af; margin: 0 2px; animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
  textarea:focus { outline: none; }
  .scroll-area { scroll-behavior: smooth; }
</style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen">

<div class="max-w-3xl mx-auto px-4 py-6">

  <!-- Header -->
  <header class="text-center mb-4">
    <div class="inline-flex items-center gap-2 bg-indigo-100 text-indigo-700 text-xs px-3 py-1 rounded-full mb-2">
      <span>🧭</span><span>决策树体验版 v0.8.0-beta</span>
    </div>
    <h1 class="text-2xl font-bold text-gray-800">AI 合伙智囊</h1>
    <p class="text-sm text-gray-500 mt-1">和 AI 聊 5 句话，让它帮你设计合伙方案</p>
    <a href="/" class="inline-block mt-2 text-xs text-indigo-600 hover:underline">← 回到标准版</a>
  </header>

  <!-- 场景识别条 -->
  <div id="scene-bar" class="hidden bg-white/80 backdrop-blur rounded-xl border border-indigo-100 px-4 py-3 mb-3">
    <div class="text-xs text-gray-500 mb-1.5">🧭 决策树已识别：</div>
    <div id="scene-tags" class="flex flex-wrap gap-1.5"></div>
  </div>

  <!-- 对话区 -->
  <div id="chat-area" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 mb-3 min-h-[400px] max-h-[55vh] overflow-y-auto scroll-area">
    <div class="flex justify-center mb-4">
      <div class="bg-indigo-50 text-indigo-700 text-xs px-3 py-1.5 rounded-full">
        👋 你好！我是 AI 合伙智囊。点击选项快速选，也可以在输入框里直接描述。
      </div>
    </div>
    <!-- 对话消息会动态插入 -->
  </div>

  <!-- 输入区（始终可见，支持双轨） -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-3">
    <div class="flex gap-2 items-end">
      <textarea
        id="user-input"
        rows="2"
        placeholder="或直接描述情况…例如：我和朋友合伙开餐厅，他只出钱我全职"
        class="flex-1 resize-none border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-indigo-400"></textarea>
      <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium h-fit">
        发送
      </button>
    </div>
    <div class="text-xs text-gray-400 mt-1.5 px-1">
      💡 边打字我会边识别你描述的人、出资、关心点
    </div>
  </div>

  <!-- 报告生成按钮（终态出现） -->
  <div id="action-area" class="hidden mt-3 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-2xl p-5 text-white">
    <div class="text-sm font-medium mb-1">🎯 信息收集完毕</div>
    <div id="final-summary" class="text-xs opacity-90 mb-3"></div>
    <button id="generate-btn" class="w-full bg-white text-indigo-700 hover:bg-indigo-50 font-bold py-3 rounded-xl">
      🚀 生成完整方案
    </button>
  </div>

  <!-- 结果展示 -->
  <div id="result-area" class="hidden mt-3 bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
    <div class="text-sm font-medium text-gray-700 mb-2">📋 AI 提取的表单数据：</div>
    <pre id="result-json" class="bg-gray-50 rounded-lg p-3 text-xs overflow-x-auto"></pre>
    <div class="mt-3 text-xs text-gray-500">
      ✅ 已自动填充到表单字段（待回主页面继续生成完整报告）
    </div>
    <div id="model-used" class="mt-2 text-xs text-gray-400"></div>
    <a href="/" class="inline-block mt-3 bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-2 rounded-lg">
      回到主页面 →
    </a>
  </div>

</div>

<script>
// ===== 状态 =====
let state = {};
let currentBlock = null;
let isProcessing = false;
let isFinal = false;

// ===== 工具 =====
const $ = (id) => document.getElementById(id);

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

function scrollBottom() {
  const area = $('chat-area');
  area.scrollTop = area.scrollHeight;
}

function addBotBubble(text, options = null) {
  const area = $('chat-area');
  const wrap = document.createElement('div');
  wrap.className = 'flex justify-start mb-3';
  
  const avatar = '<div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-sm mr-2 flex-shrink-0">🤖</div>';
  
  let body = `<div class="chat-bubble-bot px-4 py-2.5 max-w-[80%] text-sm">${escapeHtml(text)}</div>`;
  
  if (options && options.length) {
    const btns = options.map((o, i) => {
      const icon = o.icon ? `${o.icon} ` : '';
      const desc = o.desc ? `<div class="text-xs opacity-70 mt-0.5">${escapeHtml(o.desc)}</div>` : '';
      return `<button class="opt-btn bg-white border-2 border-gray-200 hover:border-indigo-400 rounded-xl px-3 py-2.5 text-left text-sm"
                      data-idx="${i}">
                <div class="font-medium text-gray-800">${icon}${escapeHtml(o.label)}</div>
                ${desc}
              </button>`;
    }).join('');
    body += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-2 max-w-[80%]">${btns}</div>`;
  }
  
  wrap.innerHTML = avatar + `<div>${body}</div>`;
  area.appendChild(wrap);
  
  // 绑定选项点击
  wrap.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      const opt = options[idx];
      selectOption(opt, btn);
    });
  });
  
  scrollBottom();
}

function addUserBubble(text) {
  const area = $('chat-area');
  const wrap = document.createElement('div');
  wrap.className = 'flex justify-end mb-3';
  wrap.innerHTML = `<div class="chat-bubble-user px-4 py-2.5 max-w-[80%] text-sm">${escapeHtml(text)}</div>`;
  area.appendChild(wrap);
  scrollBottom();
}

function addTyping() {
  const area = $('chat-area');
  const wrap = document.createElement('div');
  wrap.id = 'typing-indicator';
  wrap.className = 'flex justify-start mb-3';
  wrap.innerHTML = `
    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-sm mr-2">🤖</div>
    <div class="chat-bubble-bot px-4 py-3 text-sm">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>`;
  area.appendChild(wrap);
  scrollBottom();
}

function removeTyping() {
  const t = $('typing-indicator');
  if (t) t.remove();
}

function updateSceneBar(state) {
  const bar = $('scene-bar');
  const tagsWrap = $('scene-tags');
  const tags = [];
  
  if (state.route) {
    const routeMap = { A: '📐 方案设计', B: '📄 条款定制', C: '⚠️ 纠纷异常', D: '💡 常识咨询' };
    tags.push({ text: routeMap[state.route], color: 'bg-indigo-100 text-indigo-700' });
  }
  if (state.partnerCount) tags.push({ text: `${state.partnerCount} 人`, color: 'bg-purple-100 text-purple-700' });
  if (state.funding) {
    const fMap = {
      both_funded_equal: '都出钱同全职',
      investor_operator: '我全职，他只出钱',
      tech_money: '我出钱，他出技术',
      family: '夫妻/亲属',
      one_dominant: '1 主 2 跟投',
      three_roles: '资金/运营/技术三角色',
      equal_three: '三人均分',
      one_angel_many_hands: '1 天使 + 3 执行',
      equal_pool: '4-5 人均分',
      franchise: '加盟合伙',
      platform: '平台持股',
      unclear: '通用基准'
    };
    tags.push({ text: fMap[state.funding] || state.funding, color: 'bg-pink-100 text-pink-700' });
  }
  if (state.concern) {
    const cMap = { equity: '💼 股权', dividend: '💰 分红', exit: '🚪 退出', control: '🗳️ 控制权', agreement: '📜 协议' };
    tags.push({ text: cMap[state.concern] || state.concern, color: 'bg-green-100 text-green-700' });
  }
  if (state.business) tags.push({ text: `🏪 ${state.business}`, color: 'bg-orange-100 text-orange-700' });
  if (state.tags && state.tags.length) {
    const tagDesc = {
      exit: '🚪 退出', loss: '📉 亏损', deadlock: '⛔ 僵局',
      partner_missing: '👻 失联', no_agreement: '📝 仅口头',
      perceived_unfair: '⚖️ 怕不公平', nominee: '👤 代持',
      noncompete: '🔒 竞业', dry_share: '🎁 干股',
      divorce: '💔 分手', death: '⚰️ 身故'
    };
    state.tags.forEach(t => {
      tags.push({ text: tagDesc[t] || t, color: 'bg-red-100 text-red-700' });
    });
  }
  
  if (tags.length === 0) {
    bar.classList.add('hidden');
    return;
  }
  
  bar.classList.remove('hidden');
  tagsWrap.innerHTML = tags.map(t => 
    `<span class="tag inline-block ${t.color} text-xs px-2 py-1 rounded-full font-medium">${escapeHtml(t.text)}</span>`
  ).join('');
}

async function loadNextStep(text = '') {
  if (isProcessing) return;
  isProcessing = true;
  addTyping();
  
  try {
    const res = await fetch('/api/decision-tree/next', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ state, text })
    });
    const data = await res.json();
    
    removeTyping();
    
    if (data.state) state = data.state;
    if (data.block) currentBlock = data.block;
    
    // 显示新块
    if (data.block) {
      addBotBubble(data.block.prompt, data.block.options);
      
      // 是否终态
      if (data.block.isFinal) {
        isFinal = true;
        showFinalActions();
      }
    }
    
    updateSceneBar(state);
  } catch (err) {
    removeTyping();
    addBotBubble('❌ 出错了：' + err.message);
  }
  
  isProcessing = false;
}

function selectOption(opt, btnEl) {
  if (isProcessing) return;
  
  // 视觉反馈
  btnEl.classList.add('selected');
  btnEl.disabled = true;
  
  // 添加用户消息
  const text = opt.label + (opt.desc ? `（${opt.desc}）` : '');
  addUserBubble(text);
  
  // 更新状态
  if (currentBlock.id === 'start') {
    state.route = opt.value;
  } else if (currentBlock.id === 'count_design') {
    state.partnerCount = opt.value;
  } else if (currentBlock.id && currentBlock.id.startsWith('branch_')) {
    state.funding = opt.value;
    state.branch = opt.branch;
  } else if (currentBlock.id === 'concern') {
    state.concern = opt.value;
  } else if (currentBlock.id === 'abnormal_type') {
    state.tags = state.tags || [];
    if (opt.tag && !state.tags.includes(opt.tag)) state.tags.push(opt.tag);
  } else if (currentBlock.id === 'faq_topic') {
    state.concern = opt.value;
  }
  
  loadNextStep('');
}

function showFinalActions() {
  const area = $('action-area');
  const summary = $('final-summary');
  area.classList.remove('hidden');
  
  const sceneText = state.branch || 
    `${state.partnerCount || '?'}人${state.funding ? '_' + state.funding : ''}${state.concern ? '_' + state.concern : ''}`;
  summary.textContent = `📍 场景识别：${sceneText}`;
}

async function doFinalize() {
  const freeText = $('user-input').value.trim();
  const btn = $('generate-btn');
  btn.disabled = true;
  btn.textContent = '🤖 AI 分析中...';
  
  try {
    const res = await fetch('/api/decision-tree/finalize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ state, freeText })
    });
    const data = await res.json();
    
    if (data.ok) {
      $('result-area').classList.remove('hidden');
      $('result-json').textContent = JSON.stringify(data.formData, null, 2);
      if (data.modelUsed) {
        $('model-used').textContent = '🤖 使用模型：' + data.modelUsed;
      }
      
      // 把表单数据存到 localStorage，让主页能读取
      localStorage.setItem('dt_prefill', JSON.stringify({
        scene: data.scene,
        formData: data.formData,
        aiInput: data.aiInput,
        ts: Date.now()
      }));
      
      // 滚动到底
      $('result-area').scrollIntoView({ behavior: 'smooth' });
    } else {
      alert('生成失败：\n' + (data.error || '未知错误') + '\n\n提示：' + (data.hint || ''));
      btn.disabled = false;
      btn.textContent = '🚀 生成完整方案';
    }
  } catch (err) {
    alert('网络错误：' + err.message);
    btn.disabled = false;
    btn.textContent = '🚀 生成完整方案';
  }
}

// ===== 事件绑定 =====

$('send-btn').addEventListener('click', () => {
  const input = $('user-input');
  const text = input.value.trim();
  if (!text || isProcessing) return;
  
  addUserBubble(text);
  input.value = '';
  loadNextStep(text);
});

$('user-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    $('send-btn').click();
  }
});

$('generate-btn').addEventListener('click', doFinalize);

// ===== 启动 =====
(async () => {
  try {
    const res = await fetch('/api/decision-tree/start');
    const data = await res.json();
    if (data.block) {
      currentBlock = data.block;
      setTimeout(() => {
        addBotBubble(data.block.prompt, data.block.options);
      }, 400);
    }
  } catch (err) {
    addBotBubble('❌ 初始化失败：' + err.message);
  }
})();
</script>

</body>
</html>
