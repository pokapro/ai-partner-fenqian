<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 合伙智囊 — 决策树体验版</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>" />
<style>
  :root {
    --text: #171717; --text-sec: #4d4d4d; --text-ter: #808080;
    --bg: #ffffff; --bg-sub: #fafafa;
    --accent: #171717; --accent-hover: #333;
    --shadow: rgba(0,0,0,0.08) 0px 0px 0px 1px;
    --shadow-hover: rgba(0,0,0,0.14) 0px 0px 0px 1px;
    --radius: 8px; --radius-sm: 6px;
    --ease: cubic-bezier(0.25,0.1,0.25,1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .c { max-width: 720px; margin: 0 auto; padding: 0 1rem; }

  /* Header */
  header {
    text-align: center; padding: 1.5rem 0 1rem;
    position: relative;
  }
  header::after {
    content: ''; position: absolute; bottom: 0; left: 10%; right: 10%;
    height: 1px; background: linear-gradient(90deg, transparent, rgba(0,0,0,0.06), transparent);
  }
  header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.3px; }
  header p { font-size: 0.8rem; color: var(--text-sec); margin-top: 0.15rem; }
  header .badge {
    display: inline-block; font-size: 0.7rem;
    background: linear-gradient(135deg, #f5f5f5, #eee);
    color: var(--text-sec); padding: 0.2rem 0.7rem; border-radius: 999px;
    box-shadow: var(--shadow); margin-bottom: 0.5rem;
  }
  header a { font-size: 0.75rem; color: var(--text-ter); display: inline-block; margin-top: 0.5rem; text-decoration: none; transition: color 0.2s var(--ease); }
  header a:hover { color: var(--text); }

  /* Chat area */
  .chat-wrap {
    background: var(--bg); border-radius: var(--radius);
    box-shadow: var(--shadow), rgba(0,0,0,0.04) 0px 2px 2px;
    padding: 1rem; margin-bottom: 0.75rem;
    min-height: 300px; max-height: 55vh; overflow-y: auto;
  }
  .chat-wrap::-webkit-scrollbar { width: 4px; }
  .chat-wrap::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

  /* Bubbles */
  .msg { display: flex; margin-bottom: 0.75rem; animation: msgIn 0.25s var(--ease); }
  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg-bot { justify-content: flex-start; }
  .msg-user { justify-content: flex-end; }
  .msg .avatar { width: 1.5rem; height: 1.5rem; border-radius: 50%; background: linear-gradient(135deg, #f0f0f0, #e8e8e8); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; margin-right: 0.5rem; flex-shrink: 0; box-shadow: var(--shadow); }
  .msg .body {
    max-width: 80%; font-size: 0.85rem; line-height: 1.6;
    padding: 0.55rem 0.8rem; border-radius: var(--radius);
    transition: box-shadow 0.2s var(--ease);
  }
  .msg-bot .body { background: var(--bg-sub); color: var(--text); border-bottom-left-radius: 2px; }
  .msg-user .body { background: var(--accent); color: white; border-bottom-right-radius: 2px; }

  /* Option buttons */
  .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; margin-top: 0.5rem; max-width: 80%; }
  .opts .opt {
    background: white; border: none; text-align: left; font-size: 0.8rem;
    padding: 0.55rem 0.8rem; border-radius: var(--radius); cursor: pointer;
    box-shadow: var(--shadow); transition: all 0.15s var(--ease);
    font-family: inherit; color: var(--text); position: relative; overflow: hidden;
  }
  .opts .opt::after {
    content: ''; position: absolute; inset: 0; background: var(--accent);
    opacity: 0; transition: opacity 0.15s var(--ease);
  }
  .opts .opt:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
  .opts .opt:active { transform: translateY(0); }
  .opts .opt.selected { background: var(--accent); color: white; box-shadow: none; }
  .opts .opt.selected::after { opacity: 0; }
  .opts .opt .desc { font-size: 0.7rem; color: var(--text-ter); margin-top: 0.1rem; position: relative; z-index: 1; }
  .opts .opt.selected .desc { color: rgba(255,255,255,0.7); }

  /* Input */
  .input-wrap {
    background: var(--bg); border-radius: var(--radius);
    box-shadow: var(--shadow), rgba(0,0,0,0.04) 0px 2px 2px;
    padding: 0.6rem;
  }
  .input-wrap .row { display: flex; gap: 0.5rem; align-items: flex-end; }
  .input-wrap textarea {
    flex: 1; resize: none; border: none; font-size: 0.85rem; line-height: 1.5;
    padding: 0.4rem 0; font-family: inherit; color: var(--text);
    background: transparent;
  }
  .input-wrap textarea::placeholder { color: var(--text-ter); }
  .input-wrap textarea:focus { outline: none; }
  .input-wrap .send {
    background: var(--accent); color: white; border: none;
    padding: 0.4rem 1rem; border-radius: 6px; font-size: 0.8rem; font-weight: 500;
    cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .input-wrap .send:hover { background: var(--accent-hover); }
  .input-wrap .hint { font-size: 0.7rem; color: var(--text-ter); margin-top: 0.3rem; padding-left: 0.1rem; }

  /* Action area */
  .action {
    margin-top: 0.75rem; background: var(--accent); color: white;
    border-radius: var(--radius); padding: 1.25rem; text-align: center;
  }
  .action .title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.25rem; }
  .action .summary { font-size: 0.75rem; opacity: 0.8; margin-bottom: 0.75rem; }
  .action .btn {
    width: 100%; background: white; color: var(--text); border: none;
    padding: 0.6rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .action .btn:hover { opacity: 0.9; }

  /* Result area */
  .result { margin-top: 0.75rem; }
  .result .bar {
    display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem;
    padding: 0.5rem 0; border-bottom: 1px solid #eee;
  }
  .result .bar button {
    font-size: 0.75rem; background: var(--bg-sub); border: none;
    padding: 0.25rem 0.6rem; border-radius: 6px; cursor: pointer;
    box-shadow: var(--shadow); font-family: inherit; color: var(--text);
  }
  .result .bar button:hover { background: #eee; }

  /* Report styles */
  #report-sections { font-size: 0.82rem; line-height: 1.7; color: var(--text); }
  #report-sections h2 { font-size: 1.05rem; font-weight: 600; margin: 1.25rem 0 0.5rem; }
  #report-sections h3 { font-size: 0.92rem; font-weight: 600; margin: 1rem 0 0.4rem; color: var(--text-sec); }
  #report-sections p { margin-bottom: 0.5rem; }
  #report-sections table { border-collapse: collapse; width: 100%; margin: 0.5rem 0; font-size: 0.78rem; }
  #report-sections th, #report-sections td { border: 1px solid #eee; padding: 0.35rem 0.5rem; text-align: left; vertical-align: top; }
  #report-sections th { background: var(--bg-sub); font-weight: 500; }
  #report-sections blockquote { border-left: 3px solid #ddd; margin: 0.5rem 0; padding: 0.3rem 0.75rem; color: var(--text-sec); font-size: 0.8rem; }
  #report-sections code { background: var(--bg-sub); padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.78rem; }
  #report-sections pre { background: var(--bg-sub); padding: 0.75rem; border-radius: 6px; overflow-x: auto; font-size: 0.78rem; margin: 0.5rem 0; }
  #report-sections hr { border: none; border-top: 1px solid #eee; margin: 1rem 0; }

  /* Typing */
  .typing { display: flex; align-items: center; gap: 0.25rem; padding: 0.5rem 0; }
  .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: #ccc; animation: b 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes b { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

  /* Tags */
  .tag { animation: fi 0.3s ease; display: inline-block; font-size: 0.7rem; padding: 0.1rem 0.45rem; border-radius: 999px; font-weight: 500; }
  @keyframes fi { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }

  /* Restore bar */
  .restore-bar {
    display: flex; justify-content: center; margin-bottom: 0.75rem;
    background: var(--bg-sub); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 0.6rem 1rem; font-size: 0.78rem; gap: 0.5rem; align-items: center;
  }
  .restore-bar button {
    background: var(--accent); color: white; border: none;
    padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.72rem; cursor: pointer; font-family: inherit;
  }
  .restore-bar .sec { background: #eee; color: var(--text); }
  .hidden { display: none !important; }
  .mt-1 { margin-top: 0.5rem; }

  @media (max-width: 500px) {
    .opts { grid-template-columns: 1fr; }
    .chat-wrap { min-height: 200px; }
  }
</style>
</head>
<body>

<div class="c">

<header>
  <div class="badge">🧭 决策树体验版</div>
  <h1>AI 合伙智囊</h1>
  <p>描述你的合伙情况，系统帮你设计方案</p>
  <a href="/">← 回到标准版</a>
</header>

<!-- 对话区 -->
<div id="chat-area" class="chat-wrap">
  <!-- 对话消息动态插入 -->
</div>

<!-- 输入区 -->
<div class="input-wrap">
  <div class="row">
    <textarea id="user-input" rows="2" placeholder="描述你们的合伙情况…例如：我和 2 个朋友开奶茶店，我出10万全职，他出5万技术入股"></textarea>
    <button id="send-btn" class="send">分析</button>
  </div>
  <div class="hint">描述越详细，分析越精准</div>
</div>

<!-- 生成按钮 -->
<div id="action-area" class="action hidden">
  <div class="title">🎯 信息收集完毕</div>
  <div id="final-summary" class="summary"></div>
  <button id="generate-btn" class="btn">🚀 生成完整方案</button>
</div>

<!-- 报告区 -->
<div id="result-area" class="result hidden">
  <div class="bar">
    <button id="copy-md-btn">📋 复制 Markdown</button>
    <button id="copy-plain-btn">📝 复制纯文本</button>
    <button id="download-md-btn">⬇️ 下载 .md</button>
    <button id="download-html-btn">⬇️ 下载 .html</button>
    <button id="print-btn">🖨️ 打印</button>
    <button id="back-to-start-btn" style="margin-left:auto;">🔄 重新开始</button>
  </div>
  <div id="report-sections"></div>
  <div id="model-used" style="font-size:0.7rem;color:var(--text-ter);margin-top:0.5rem;text-align:center;"></div>
</div>

</div>

<script>
// ===== 状态 =====
let state = {};
let currentBlock = null;
let isProcessing = false;
let isFinal = false;
let lastUserText = '';  // 保存用户原始输入，供生成报告使用

// ===== 持久化 =====
const LS_KEY = 'dt_state';

function saveState() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      state,
      currentBlock: currentBlock ? { id: currentBlock.id, isFinal: currentBlock.isFinal } : null,
      isFinal,
      lastUserText,
      lastReportMd,
      timestamp: Date.now()
    }));
  } catch(e) { /* localStorage 满了忽略 */ }
}

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d.state || Date.now() - d.timestamp > 86400000) return false; // 超24小时忽略
    state = d.state || {};
    if (d.currentBlock) {
      currentBlock = d.currentBlock;
      isFinal = d.isFinal || false;
    }
    lastUserText = d.lastUserText || '';
    lastReportMd = d.lastReportMd || '';
    return true;
  } catch(e) { return false; }
}

function clearState() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

// ===== 工具 =====
const $ = (id) => document.getElementById(id);

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

function scrollBottom() {
  const area = $('chat-area');
  area.scrollTop = area.scrollHeight;
}

function addBotBubble(text, options = null) {
  const area = $('chat-area');
  const wrap = document.createElement('div');
  wrap.className = 'msg msg-bot';
  
  const avatar = '<div class="avatar">🤖</div>';
  
  let body = `<div class="body">${escapeHtml(text)}</div>`;
  
  if (options && options.length) {
    const btns = options.map((o, i) => {
      const icon = o.icon ? `${o.icon} ` : '';
      const desc = o.desc ? `<div class="desc">${escapeHtml(o.desc)}</div>` : '';
      return `<button class="opt" data-idx="${i}">
                <div style="font-weight:500;">${icon}${escapeHtml(o.label)}</div>
                ${desc}
              </button>`;
    }).join('');
    body += `<div class="opts">${btns}</div>`;
  }
  
  wrap.innerHTML = avatar + `<div>${body}</div>`;
  area.appendChild(wrap);
  
  // 绑定选项点击
  wrap.querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      const opt = options[idx];
      selectOption(opt, btn);
    });
  });
  
  scrollBottom();
}

function addUserBubble(text) {
  const area = $('chat-area');
  const wrap = document.createElement('div');
  wrap.className = 'msg msg-user';
  wrap.innerHTML = `<div class="body">${escapeHtml(text)}</div>`;
  area.appendChild(wrap);
  scrollBottom();
}

function addTyping() {
  const area = $('chat-area');
  const wrap = document.createElement('div');
  wrap.id = 'typing-indicator';
  wrap.className = 'msg msg-bot';
  wrap.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="body">
      <div class="typing">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    </div>`;
  area.appendChild(wrap);
  scrollBottom();
}

function removeTyping() {
  const t = $('typing-indicator');
  if (t) t.remove();
}

function updateSceneBar(state) {
  const bar = $('scene-bar');
  const tagsWrap = $('scene-tags');
  
  // scene-bar 可能在 UI 中被移除，不影响主流程
  if (!bar || !tagsWrap) return;
  const tags = [];
  
  if (state.route) {
    const routeMap = { A: '📐 方案设计', B: '📄 条款定制', C: '⚠️ 纠纷异常', D: '💡 常识咨询' };
    tags.push({ text: routeMap[state.route], color: 'bg-indigo-100 text-indigo-700' });
  }
  if (state.partnerCount) tags.push({ text: `${state.partnerCount} 人`, color: 'bg-purple-100 text-purple-700' });
  if (state.funding) {
    const fMap = {
      both_funded_equal: '都出钱同全职',
      investor_operator: '我全职，他只出钱',
      tech_money: '我出钱，他出技术',
      family: '夫妻/亲属',
      one_dominant: '1 主 2 跟投',
      three_roles: '资金/运营/技术三角色',
      equal_three: '三人均分',
      one_angel_many_hands: '1 天使 + 3 执行',
      equal_pool: '4-5 人均分',
      franchise: '加盟合伙',
      platform: '平台持股',
      unclear: '通用基准'
    };
    tags.push({ text: fMap[state.funding] || state.funding, color: 'bg-pink-100 text-pink-700' });
  }
  if (state.concern) {
    const cMap = { equity: '💼 股权', dividend: '💰 分红', exit: '🚪 退出', control: '🗳️ 控制权', agreement: '📜 协议' };
    tags.push({ text: cMap[state.concern] || state.concern, color: 'bg-green-100 text-green-700' });
  }
  if (state.business) tags.push({ text: `🏪 ${state.business}`, color: 'bg-orange-100 text-orange-700' });
  if (state.tags && state.tags.length) {
    const tagDesc = {
      exit: '🚪 退出', loss: '📉 亏损', deadlock: '⛔ 僵局',
      partner_missing: '👻 失联', no_agreement: '📝 仅口头',
      perceived_unfair: '⚖️ 怕不公平', nominee: '👤 代持',
      noncompete: '🔒 竞业', dry_share: '🎁 干股',
      divorce: '💔 分手', death: '⚰️ 身故'
    };
    state.tags.forEach(t => {
      tags.push({ text: tagDesc[t] || t, color: 'bg-red-100 text-red-700' });
    });
  }
  
  if (tags.length === 0) {
    bar.classList.add('hidden');
    return;
  }
  
  bar.classList.remove('hidden');
  tagsWrap.innerHTML = tags.map(t => 
    `<span class="tag inline-block ${t.color} text-xs px-2 py-1 rounded-full font-medium">${escapeHtml(t.text)}</span>`
  ).join('');
}

async function loadNextStep(text = '') {
  if (isProcessing) return;
  isProcessing = true;
  addTyping();
  
  try {
    const res = await fetch('/api/decision-tree/next', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ state, text })
    });
    const data = await res.json();
    
    removeTyping();
    
    if (data.state) state = data.state;
    if (data.block) currentBlock = data.block;
    
    // 持久化
    saveState();
    
    // 显示新块
    if (data.block) {
      addBotBubble(data.block.prompt, data.block.options);
      
      // 是否终态
      if (data.block.isFinal) {
        isFinal = true;
        showFinalActions();
      }
    }
    
    updateSceneBar(state);
  } catch (err) {
    removeTyping();
    addBotBubble('❌ 出错了：' + err.message);
  }
  
  isProcessing = false;
}

function selectOption(opt, btnEl) {
  if (isProcessing) return;
  
  // 视觉反馈
  btnEl.classList.add('selected');
  btnEl.disabled = true;
  
  // 添加用户消息
  const text = opt.label + (opt.desc ? `（${opt.desc}）` : '');
  addUserBubble(text);
  
  // 更新状态
  if (currentBlock.id === 'start') {
    state.route = opt.value;
  } else if (currentBlock.id === 'count_design') {
    state.partnerCount = opt.value;
  } else if (currentBlock.id && currentBlock.id.startsWith('branch_')) {
    state.funding = opt.value;
    state.branch = opt.branch;
  } else if (currentBlock.id === 'concern') {
    state.concern = opt.value;
  } else if (currentBlock.id === 'abnormal_type') {
    state.tags = state.tags || [];
    if (opt.tag && !state.tags.includes(opt.tag)) state.tags.push(opt.tag);
  } else if (currentBlock.id === 'faq_topic') {
    state.concern = opt.value;
  }
  
  loadNextStep('');
}

function showFinalActions() {
  const area = $('action-area');
  const summary = $('final-summary');
  area.classList.remove('hidden');
  
  const sceneText = state.branch || 
    `${state.partnerCount || '?'}人${state.funding ? '_' + state.funding : ''}${state.concern ? '_' + state.concern : ''}`;
  summary.textContent = `📍 场景识别：${sceneText}`;
}

// ===== L0-L4 五段式报告渲染 =====
function renderDTReport(data) {
  $('result-area').classList.remove('hidden');

  // 1. 场景摘要条
  $('result-scene').innerHTML = `
    <div class="font-medium mb-1">🧭 ${escapeHtml(data.scene || '决策树推理结果')}</div>
    <div class="text-xs opacity-90">${escapeHtml(data.aiInput || '')}</div>
  `;

  // 2. 分支信息
  const branchText = data.branch
    ? `📍 决策树命中：${escapeHtml(data.branch)}`
    : '📍 决策树命中：通用基准型';
  $('result-branch').textContent = branchText;

  // 3. 警告（如缺段）
  if (data.warning) {
    $('result-warning').textContent = '⚠️ ' + data.warning;
    $('result-warning').classList.remove('hidden');
  } else {
    $('result-warning').classList.add('hidden');
  }

  // 4. 按 L0-L4 五段切分 markdown 并渲染
  const md = data.markdown || '';
  const sections = splitL0L4(md);
  const wrap = $('report-sections');
  wrap.innerHTML = '';

  if (sections.length === 0) {
    wrap.innerHTML = `<div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 prose prose-sm max-w-none">${renderMarkdown(md)}</div>`;
  } else {
    sections.forEach(sec => {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden';

      // 段头颜色：需求响应表 = 琥珀金，L0-L4 = 各自色
      const colorMap = {
        REQ: 'from-amber-400 to-orange-500',
        L0: 'from-sky-500 to-blue-500',
        L1: 'from-indigo-500 to-purple-500',
        L2: 'from-amber-500 to-orange-500',
        L3: 'from-emerald-500 to-teal-500',
        L4: 'from-rose-500 to-pink-500'
      };
      const gradient = colorMap[sec.id] || 'from-gray-500 to-gray-600';
      const descMap = {
        REQ: '客户原始需求 · 逐项响应',
        L0: '一句话场景结论',
        L1: '决策树拼装的条款模块',
        L2: '场景对应的法律风险与边界',
        L3: '偏控制权 / 偏激励 替代方案',
        L4: '下一步需要补充的关键信息'
      };

      card.innerHTML = `
        <div class="bg-gradient-to-r ${gradient} text-white px-4 py-2.5 flex items-center justify-between cursor-pointer" data-toggle>
          <div>
            <div class="font-bold text-sm">${sec.id} · ${escapeHtml(sec.title || '')}</div>
            <div class="text-xs opacity-90">${escapeHtml(descMap[sec.id] || '')}</div>
          </div>
          <div class="text-lg transition-transform" data-arrow>▼</div>
        </div>
        <div class="p-4 prose prose-sm max-w-none" data-content>${renderMarkdown(sec.content)}</div>
      `;
      wrap.appendChild(card);

      // 点击折叠
      const header = card.querySelector('[data-toggle]');
      const content = card.querySelector('[data-content]');
      const arrow = card.querySelector('[data-arrow]');
      header.addEventListener('click', () => {
        const collapsed = content.style.display === 'none';
        content.style.display = collapsed ? '' : 'none';
        arrow.style.transform = collapsed ? '' : 'rotate(-90deg)';
      });
    });
  }

  // 已隐藏 model 名称 — 用户不需要知道底层用哪个 AI 模型
  // 如需排查，在 server log / /api/health/ai-key-info 查看
  if (data.modelUsed) {
    console.log('[debug] modelUsed:', data.modelUsed);
  }

  // 缓存报告原文（供下载/复制使用）
  lastReportMd = data.markdown || '';

  $('result-area').scrollIntoView({ behavior: 'smooth' });
}

// 把 markdown 切成「需求响应表 + L0-L4」五段
function splitL0L4(md) {
  const sections = [];
  // 「需求响应表」是 L0 之前的独立块，单独识别
  const reqMatch = md.match(/##\s*📋\s*需求响应表([\s\S]*?)(?=##\s*📍\s*L0|$)/);
  if (reqMatch) {
    sections.push({
      id: 'REQ',
      title: '需求响应表',
      content: reqMatch[1].trim(),
      isPre: true
    });
    const l0Start = md.indexOf('## 📍 L0');
    if (l0Start >= 0) md = md.slice(l0Start);
  }
  const regex = /##\s*(?:📍\s*)?L([0-4])\s*([^\n]+)/g;
  const matches = [];
  let m;
  while ((m = regex.exec(md)) !== null) {
    matches.push({ id: 'L' + m[1], title: m[2].trim(), start: m.index });
  }
  if (matches.length === 0 && sections.length === 0) return [];
  for (let i = 0; i < matches.length; i++) {
    const cur = matches[i];
    const next = matches[i + 1];
    const lineEnd = md.indexOf('\n', cur.start);
    const contentStart = lineEnd === -1 ? md.length : lineEnd + 1;
    const contentEnd = next ? next.start : md.length;
    sections.push({
      id: cur.id,
      title: cur.title,
      content: md.slice(contentStart, contentEnd).trim()
    });
  }
  return sections;
}

// 轻量 markdown 渲染（标题、粗体、表格、列表、blockquote、代码）
function renderMarkdown(md) {
  if (!md) return '';
  let html = escapeHtml(md);

  // 标题 ### / ####
  html = html.replace(/^####\s+(.+)$/gm, '<h4 class="text-sm font-bold mt-2 mb-1">$1</h4>');
  html = html.replace(/^###\s+(.+)$/gm, '<h3 class="text-sm font-bold mt-3 mb-1 text-gray-800">$1</h3>');

  // 加粗
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong class="font-bold text-gray-900">$1</strong>');

  // 行内代码
  html = html.replace(/`([^`]+)`/g, '<code class="bg-gray-100 text-pink-600 text-xs px-1 rounded">$1</code>');

  // blockquote
  html = html.replace(/^&gt;\s*(.+)$/gm, '<blockquote class="border-l-4 border-indigo-300 bg-indigo-50 px-3 py-1 my-1 text-sm text-gray-700">$1</blockquote>');
  html = html.replace(/^>\s*(.+)$/gm, '<blockquote class="border-l-4 border-indigo-300 bg-indigo-50 px-3 py-1 my-1 text-sm text-gray-700">$1</blockquote>');

  // 围栏代码块
  html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (m, lang, code) => {
    return `<pre class="bg-gray-900 text-gray-100 text-xs rounded-lg p-3 my-2 overflow-x-auto"><code>${code.trim()}</code></pre>`;
  });

  // 简单表格（按行解析）
  html = html.replace(/((?:\|.*\n)+)/g, (block) => {
    const rows = block.trim().split('\n');
    if (rows.length < 2) return block;
    const isSep = /^\|?[\s\-:|]+\|?$/.test(rows[1]);
    if (!isSep) return block;
    const split = (line) => line.trim().replace(/^\||\|$/g, '').split('|').map(s => s.trim());
    const head = split(rows[0]).map(c => `<th class="bg-indigo-50 px-2 py-1 text-xs font-bold text-gray-700 text-left border-b border-gray-200">${c}</th>`).join('');
    const body = rows.slice(2).map(r => {
      const cells = split(r).map(c => `<td class="px-2 py-1 text-xs text-gray-700 border-b border-gray-100">${c}</td>`).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<table class="w-full my-2 border-collapse"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
  });

  // 列表 - / *
  html = html.replace(/^[\-\*]\s+(.+)$/gm, '<li class="ml-4 list-disc text-sm text-gray-700 my-0.5">$1</li>');
  html = html.replace(/^\d+\.\s+(.+)$/gm, '<li class="ml-4 list-decimal text-sm text-gray-700 my-0.5">$1</li>');

  // 段落换行
  html = html.split(/\n\n+/).map(p => {
    if (/^<(h\d|table|ul|ol|pre|blockquote|li|hr)/.test(p.trim())) return p;
    return `<p class="text-sm text-gray-700 my-2 leading-relaxed">${p.replace(/\n/g, '<br>')}</p>`;
  }).join('\n');

  return html;
}

// ===== 报告生成入口 =====
async function doFinalize() {
  const freeText = lastUserText || $('user-input').value.trim();
  const btn = $('generate-btn');
  btn.disabled = true;
  btn.textContent = '🤖 AI 推理中（L0-L4 五段式）...';

  try {
    const res = await fetch('/api/decision-tree/generate-report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ state, freeText })
    });
    const data = await res.json();

    if (data.ok) {
      renderDTReport(data);
      // 持久化报告
      saveState();
      // 同时存到 localStorage，让正式版可以参考（不强制使用）
      localStorage.setItem('dt_prefill', JSON.stringify({
        scene: data.scene,
        branch: data.branch,
        aiInput: data.aiInput,
        ts: Date.now()
      }));
    } else {
      alert('生成失败：\n' + (data.error || '未知错误') + '\n\n提示：' + (data.hint || ''));
      btn.disabled = false;
      btn.textContent = '🚀 生成完整方案';
    }
  } catch (err) {
    alert('网络错误：' + err.message);
    btn.disabled = false;
    btn.textContent = '🚀 生成完整方案';
  }
}

// ===== 一键交付物 =====
let lastReportMd = '';  // 缓存最近一份报告全文

function getReportMd() {
  // 优先用缓存（避免 DOM 解析问题）
  if (lastReportMd) return lastReportMd;
  // 降级：从 DOM 拼
  const sections = $('report-sections').querySelectorAll('[data-content]');
  return Array.from(sections).map(s => s.innerText).join('\n\n---\n\n');
}

function getReportPlain() {
  // 去掉 markdown 语法符号，仅保留纯文本（可贴到微信/邮箱）
  return getReportMd()
    .replace(/^#{1,6}\s+/gm, '')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/^>\s*/gm, '')
    .replace(/\|/g, ' | ');
}

function getReportHtml() {
  const md = getReportMd();
  // 走现有 renderMarkdown 但包成完整 HTML 文档
  const body = renderMarkdown(md);
  return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>合伙分钱方案 - ${new Date().toLocaleDateString('zh-CN')}</title>
<style>
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; max-width: 860px; margin: 30px auto; padding: 0 20px; color: #1f2937; line-height: 1.75; }
  h1, h2, h3, h4 { color: #1e3a8a; }
  h2 { border-bottom: 2px solid #4f46e5; padding-bottom: 6px; margin-top: 32px; }
  h3 { color: #4338ca; margin-top: 24px; }
  table { border-collapse: collapse; width: 100%; margin: 16px 0; }

    ⚠️ 本方案为 AI 起草模板，最终条款建议律师审查后使用。
  </div>
  ${body}
</body>
</html>`;
}

function flashBtn(btn, text) {
  const orig = btn.innerHTML;
  btn.innerHTML = text;
  btn.classList.add('ring-2', 'ring-green-400');
  setTimeout(() => {
    btn.innerHTML = orig;
    btn.classList.remove('ring-2', 'ring-green-400');
  }, 1500);
}

function copyMarkdown() {
  const text = getReportMd();
  if (!text) return alert('暂无报告内容');
  const btn = $('copy-md-btn');
  // 优先用现代 API
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(
      () => flashBtn(btn, '✅ 已复制 Markdown'),
      () => fallbackCopy(text, btn, '✅ 已复制 Markdown')
    );
  } else {
    fallbackCopy(text, btn, '✅ 已复制 Markdown');
  }
}

function copyPlain() {
  const text = getReportPlain();
  if (!text) return alert('暂无报告内容');
  const btn = $('copy-plain-btn');
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(
      () => flashBtn(btn, '✅ 已复制纯文本'),
      () => fallbackCopy(text, btn, '✅ 已复制纯文本')
    );
  } else {
    fallbackCopy(text, btn, '✅ 已复制纯文本');
  }
}

function fallbackCopy(text, btn, okText) {
  // 旧浏览器 / 非安全上下文降级
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    flashBtn(btn, okText);
  } catch (e) {
    alert('复制失败，请手动选中报告区复制');
  }
  document.body.removeChild(ta);
}

function timestamp() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
}

function downloadFile(filename, content, mime) {
  const blob = content instanceof Blob ? content : new Blob([content], { type: mime + ';charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function downloadMd() {
  const text = getReportMd();
  if (!text) return alert('暂无报告内容');
  downloadFile(`合伙分钱方案-${timestamp()}.md`, text, 'text/markdown');
  flashBtn($('download-md-btn'), '✅ 已下载');
}

function downloadHtml() {
  const html = getReportHtml();
  if (!html) return alert('暂无报告内容');
  downloadFile(`合伙分钱方案-${timestamp()}.html`, html, 'text/html');
  flashBtn($('download-html-btn'), '✅ 已下载');
}

function printReport() {
  const html = getReportHtml();
  if (!html) return alert('暂无报告内容');
  // 在新窗口打开（避免当前对话页状态被冲）
  const w = window.open('', '_blank');
  if (!w) return alert('浏览器拦截了弹出窗口，请允许后重试');
  w.document.write(html);
  w.document.close();
  w.addEventListener('load', () => {
    setTimeout(() => w.print(), 300);
  });
}

// 重新开始
function restartDT() {
  state = {};
  currentBlock = null;
  isFinal = false;
  lastUserText = '';
  lastReportMd = '';
  clearState();
  $('chat-area').innerHTML = '';
  $('action-area').classList.add('hidden');
  $('result-area').classList.add('hidden');
  $('user-input').value = '';
}

// ===== 事件绑定 =====

$('send-btn').addEventListener('click', () => {
  const input = $('user-input');
  const text = input.value.trim();
  if (!text || isProcessing) return;
  
  addUserBubble(text);
  lastUserText = text;  // 保存原文，供生成报告使用
  input.value = '';
  loadNextStep(text);
});

$('user-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    $('send-btn').click();
  }
});

$('generate-btn').addEventListener('click', doFinalize);
$('copy-md-btn')?.addEventListener('click', copyMarkdown);
$('copy-plain-btn')?.addEventListener('click', copyPlain);
$('download-md-btn')?.addEventListener('click', downloadMd);
$('download-html-btn')?.addEventListener('click', downloadHtml);
$('print-btn')?.addEventListener('click', printReport);
$('back-to-start-btn')?.addEventListener('click', restartDT);

// ===== 启动 =====
// 不再预加载决策树按钮——用户先输入，系统再分析
// 输入框已占位提示用户描述情况
(async () => {
  // 尝试恢复上次会话
  const restored = loadState();
  if (restored && lastReportMd) {
    // 有已生成的报告，显示恢复按钮
    $('chat-area').innerHTML = `
      <div class="restore-bar">
        <span>📂 检测到上次的会话记录</span>
        <button onclick="restoreSession()">恢复</button>
        <button class="sec" onclick="clearState();location.reload()">重新开始</button>
      </div>`;
  } else if (restored) {
    // 有对话状态但没报告，自动恢复
    restoreSession();
  }
  
  try {
    const res = await fetch('/api/decision-tree/start');
    const data = await res.json();
    if (data.block) {
      currentBlock = data.block;
    }
  } catch (err) {
    console.warn('[init] start block fetch failed (non-fatal):', err.message);
  }
})();

function restoreSession() {
  $('chat-area').innerHTML = '';
  if (isFinal) showFinalActions();
  if (lastReportMd) {
    // 有报告就显示报告区
    $('result-area').classList.remove('hidden');
  }
}
</script>
