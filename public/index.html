<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>合伙算钱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  <div id="app" class="max-w-2xl mx-auto px-4 py-6">

    <!-- Header -->
    <header class="text-center mb-6">
      <h1 class="text-2xl font-bold text-indigo-700 mb-2">🤝 合伙算钱</h1>
      <p class="text-gray-600 text-sm">输入合伙情况，生成 2-3 套分配方案、利润模拟和条款草稿</p>
      <div class="mt-3 bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-sm text-yellow-800">
        ⚠️ 合伙前没说清楚钱怎么分，后面最容易伤感情
      </div>
    </header>

    <!-- Form -->
    <form id="partnerForm" class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 space-y-5">

      <!-- Partner Count -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">合伙人数 <span class="text-red-500">*</span></label>
        <div class="flex gap-3">
          <button type="button" class="partner-count-btn flex-1 py-2 px-4 rounded-lg border-2 border-gray-300 text-center transition" data-value="2">2 人合伙</button>
          <button type="button" class="partner-count-btn flex-1 py-2 px-4 rounded-lg border-2 border-gray-300 text-center transition" data-value="3">3 人合伙</button>
        </div>
        <input type="hidden" name="partnerCount" id="partnerCount" value="">
      </div>

      <!-- Partner Info Container -->
      <div id="partnerFields" class="space-y-4"></div>

      <!-- Expected Profit -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">预期年利润 <span class="text-red-500">*</span></label>
        <select name="expectedProfit" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400">
          <option value="">请选择</option>
          <option value="10-20万">10-20 万</option>
          <option value="30-50万" selected>30-50 万</option>
          <option value="50-100万">50-100 万</option>
          <option value="100-200万">100-200 万</option>
          <option value="200万以上">200 万以上</option>
        </select>
      </div>

      <!-- Oral Agreement -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">是否已有口头约定？</label>
        <textarea name="oralAgreement" rows="2" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400" placeholder="例如：暂定五五分、按出资比例分等"></textarea>
      </div>

      <!-- Loss Concern -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">是否担心亏损承担？</label>
        <textarea name="lossConcern" rows="2" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400" placeholder="例如：担心亏损由谁承担"></textarea>
      </div>

      <!-- Exit Concern -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">是否需要退出机制建议？</label>
        <textarea name="exitConcern" rows="2" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400" placeholder="例如：希望有人退出时能说清楚"></textarea>
      </div>

      <!-- Contact -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">联系方式（微信或手机号） <span class="text-red-500">*</span></label>
        <input type="text" name="contact" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400" placeholder="必填，以便交付报告" required>
      </div>

      <!-- Submit -->
      <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-medium py-3 px-4 rounded-lg hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
        生成合伙分钱方案
      </button>
    </form>

    <!-- Loading -->
    <div id="loading" class="hidden mt-6 text-center py-10">
      <div class="animate-spin inline-block w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full mb-3"></div>
      <p class="text-gray-600 text-sm">🤖 AI 正在分析您的情况...</p>
      <p class="text-gray-400 text-xs mt-1">预计需要 15-30 秒</p>
    </div>

    <!-- Error Display -->
    <div id="errorMessage" class="hidden mt-6 bg-red-50 border border-red-200 rounded-lg p-4 text-sm text-red-700"></div>

    <!-- Report Preview -->
    <div id="reportPreview" class="hidden mt-6"></div>

    <!-- Contact / Payment -->
    <div id="paymentSection" class="hidden mt-6 bg-white rounded-xl shadow-sm border border-gray-200 p-5 text-center space-y-3">
      <h3 class="text-lg font-semibold text-gray-800">📄 获取完整人工审核版</h3>
      <p class="text-sm text-gray-600">以上为 AI 生成预览。完整报告经人工审核后交付，确保方案合理可行。</p>
      <div class="flex flex-col md:flex-row gap-3 justify-center">
        <button id="pay29Btn" class="flex-1 bg-green-500 text-white py-2 px-4 rounded-lg hover:bg-green-600 transition text-sm">
          🟢 29 元体验版
        </button>
        <button id="pay99Btn" class="flex-1 bg-indigo-500 text-white py-2 px-4 rounded-lg hover:bg-indigo-600 transition text-sm">
          🔷 99 元标准版
        </button>
      </div>
      <button id="contactBtn" class="text-indigo-600 text-sm underline hover:text-indigo-800">
        添加客服领取完整报告 →
      </button>
      <div id="paymentResult" class="hidden text-sm text-green-600"></div>
    </div>

    <!-- Footer / Disclaimer -->
    <footer class="mt-8 text-center">
      <div class="bg-gray-100 rounded-lg p-3 text-xs text-gray-500">
        ⚖️ 免责声明：本工具仅提供参考性分钱方案建议，不构成正式法律意见。
        所有分配方案建议您在使用前咨询专业律师，并签署正式合伙协议。
        本工具不处理已发生纠纷，不涉及法律诉讼、债务担保或工商股权变更。
      </div>
      <p class="mt-3 text-xs text-gray-400">合伙算钱 V0 · 人工审核中</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
